# ==========================================
# Photo Battle Arena - docker-compose
# 本地开发 & 生产部署通用
# ==========================================
# 使用方式:
#   1. 从 .env.example 创建 .env 并填入真实 API Key
#   2. docker compose up -d
#   3. 生产环境访问 https://photo.innergrow.ai
#   4. 本地开发访问 http://localhost:8080
# ==========================================

services:
  # --- Rust 后端 API ---
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      # Docker 内部用服务名访问 VolcEngine
      - VOLCENGINE_URL=http://volcengine:8001
      - BASE_URL=https://photo.innergrow.ai
      - DATABASE_PATH=/app/data/photos.db
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - backend_db:/app/data
    depends_on:
      volcengine:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- VolcEngine 美学评分服务 (CPU 本地运行) ---
  volcengine:
    build:
      context: ./backend
      dockerfile: ./scripts/Dockerfile
    env_file:
      - .env
    environment:
      - VOLCENGINE_PORT=8001
      - VOLCENGINE_DEVICE=cpu
    volumes:
      - ./uploads:/app/uploads
      - volcengine_cache:/app/.model_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # --- 前端（Nginx 反向代理 + 静态文件）---
  frontend:
    build: ./frontend
    # 生产环境通过 Caddy 访问，不暴露到宿主机；本地开发可临时取消注释下行
    # ports:
    #   - "8080:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  # --- Caddy 边缘网关（自动 HTTPS + 路径分发）---
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  backend_db:
  volcengine_cache:
  caddy_data:
  caddy_config:
