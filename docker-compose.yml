# ==========================================
# Photo Battle Arena - docker-compose
# 本地开发 & 生产部署通用
# ==========================================
# 使用方式:
#   1. 从 .env.example 创建 .env 并填入真实 API Key
#   2. docker compose up -d
#   3. 访问 http://localhost:8080
# ==========================================

services:
  # --- Rust 后端 API ---
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      # Docker 内部用服务名访问 VolcEngine
      - VOLCENGINE_URL=http://volcengine:8001
      - BASE_URL=http://localhost:8080
      - DATABASE_PATH=/app/data/photos.db
      - UPLOAD_DIR=/app/uploads
    volumes:
      - backend_uploads:/app/uploads
      - backend_db:/app/data

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- 前端（Nginx 反向代理 + 静态文件）---
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_db:
